<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
html,body{margin:0;padding:0;background:#101010;height:100%}
*{box-sizing:border-box}
</style>
</helmet>

<div style="position:fixed;inset:0;background:#101010">
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
    <dc-import name="Breadman Mobile" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <dc-import name="Breadman Desktop" hint-size="100%,100%"></dc-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { mobile: false };
  componentDidMount() {
    this._check = () => {
      const m = window.innerWidth < 820;
      if (m !== this.state.mobile) this.setState({ mobile: m });
    };
    this._check();
    window.addEventListener('resize', this._check);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this._check);
  }
  renderVals() {
    return { isMobile: this.state.mobile, isDesktop: !this.state.mobile };
  }
}
</script>
</body>
</html>
